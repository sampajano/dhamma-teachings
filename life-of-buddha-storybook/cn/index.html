<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>佛陀的一生 - 图像故事书</title>
  <style>
    :root {
      --ink: #20201d;
      --muted: #6c665d;
      --paper: #f7f0e5;
      --paper-deep: #ece0cf;
      --line: rgba(55, 45, 32, .18);
      --gold: #b7852f;
      --teal: #526f68;
      --rose: #9a5c57;
      --night: #201d1a;
      --shadow: 0 18px 60px rgba(50, 38, 25, .2);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      overflow: hidden;
    }

    button, select {
      font: inherit;
    }

    .reader {
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background:
        linear-gradient(90deg, rgba(82, 111, 104, .08), transparent 18%, transparent 82%, rgba(154, 92, 87, .08)),
        radial-gradient(circle at 50% 0%, rgba(183, 133, 47, .14), transparent 36%),
        var(--paper);
    }

    .topbar {
      min-height: 58px;
      padding: 10px clamp(16px, 2.4vw, 34px);
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      background: rgba(247, 240, 229, .92);
      backdrop-filter: blur(12px);
    }

    .book-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .book-title h1 {
      margin: 0;
      font-size: clamp(18px, 1.8vw, 27px);
      line-height: 1.08;
      font-weight: 600;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .counter {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .title-link {
      color: inherit;
      text-decoration: none;
    }

    .title-link:hover {
      color: inherit;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: end;
      gap: 12px;
      min-width: 0;
    }

    .jump {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .jump label {
      color: var(--muted);
      font-size: 13px;
    }

    select {
      max-width: min(42vw, 380px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf1;
      color: var(--ink);
      padding: 7px 32px 7px 10px;
    }

    .spread {
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(340px, 1.02fr) minmax(330px, .98fr);
      gap: clamp(14px, 2vw, 28px);
      padding: clamp(14px, 2vw, 30px);
      align-items: stretch;
    }

    .image-page, .story-page {
      min-height: 0;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .image-page {
      --image-pad: clamp(6px, .8vw, 12px);
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(160deg, rgba(32, 29, 26, .98), rgba(66, 58, 45, .96)),
        var(--night);
      border-radius: 8px;
      position: relative;
    }

    .image-page img {
      position: absolute;
      inset: var(--image-pad);
      width: calc(100% - (var(--image-pad) * 2));
      height: calc(100% - (var(--image-pad) * 2));
      object-fit: contain;
      display: block;
      transition: opacity .18s ease, transform .18s ease;
    }

    .image-page::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 90px rgba(0, 0, 0, .28);
    }

    .story-page {
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(183, 133, 47, .08), transparent 16%),
        #fffaf1;
      overflow: auto;
      padding: clamp(24px, 2.7vw, 42px);
      scrollbar-color: rgba(108, 102, 93, .45) transparent;
    }

    .kicker {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 12px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .scene-title {
      margin: 0;
      font-size: clamp(24px, 2.35vw, 38px);
      line-height: 1.06;
      font-weight: 500;
      letter-spacing: 0;
    }

    .story-text {
      margin-top: clamp(16px, 2vw, 26px);
      font-size: clamp(16px, 1.05vw, 19px);
      line-height: 1.58;
    }

    .story-text p {
      margin: 0 0 1.05em;
    }

    .story-text p:last-child {
      margin-bottom: 0;
    }

    .controls {
      min-height: 62px;
      padding: 9px clamp(16px, 2.4vw, 34px) 11px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: auto minmax(220px, .85fr) minmax(140px, 1fr) auto;
      gap: 14px;
      align-items: center;
      background: rgba(236, 224, 207, .86);
    }

    .controls-peek {
      display: none;
    }

    .nav-button,
    .audio-button {
      min-width: 116px;
      border: 1px solid rgba(55, 45, 32, .24);
      border-radius: 8px;
      padding: 8px 13px;
      background: #fffaf1;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 6px 18px rgba(50, 38, 25, .1);
    }

    .nav-button:hover,
    .audio-button:hover {
      border-color: rgba(183, 133, 47, .75);
      color: #7f5519;
    }

    .nav-button:disabled,
    .audio-button:disabled {
      opacity: .42;
      cursor: default;
      box-shadow: none;
    }

    .audio-tools {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .audio-button {
      min-width: 94px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 650;
    }

    .auto-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      cursor: pointer;
    }

    .auto-toggle input {
      accent-color: var(--teal);
    }

    .audio-time {
      min-width: 92px;
      white-space: nowrap;
      color: var(--muted);
    }

    .progress-wrap {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(55, 45, 32, .14);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--gold), var(--rose));
      transition: width .2s ease;
    }

    .fade-out { opacity: .34; transform: scale(.992); }

    @media (max-width: 900px) {
      body {
        overflow-x: hidden;
        overflow-y: auto;
      }

      .reader {
        height: auto;
        min-height: 100svh;
        grid-template-rows: auto auto;
        padding-bottom: calc(168px + env(safe-area-inset-bottom));
        overflow-x: hidden;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 10px;
        min-width: 0;
      }

      .book-title {
        justify-content: space-between;
        min-width: 0;
      }

      .book-title h1 {
        white-space: normal;
      }

      .top-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 6px 10px;
        min-width: 0;
      }

      .jump {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        justify-content: normal;
        min-width: 0;
        grid-column: 1 / -1;
      }

      select {
        max-width: none;
        width: 100%;
        min-width: 0;
      }

      .spread {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(340px, 56svh) auto;
        overflow: visible;
        padding: 8px;
        min-width: 0;
      }

      .image-page {
        --image-pad: 4px;
      }

      .story-page {
        min-height: 360px;
        overflow: visible;
        padding: 24px 20px 36px;
        min-width: 0;
      }

      .controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 5;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding-bottom: calc(11px + env(safe-area-inset-bottom));
        box-shadow: 0 -12px 30px rgba(50, 38, 25, .16);
        transform: translateY(0);
        transition: transform .24s ease, opacity .24s ease;
      }

      .controls button {
        touch-action: manipulation;
      }

      .controls.controls-collapsed {
        transform: translateY(calc(100% - 16px));
      }

      .controls.controls-collapsed > :not(.controls-peek) {
        opacity: 0;
        pointer-events: none;
      }

      .controls-peek {
        position: absolute;
        top: -20px;
        left: 50%;
        width: 108px;
        min-height: 34px;
        border: 1px solid rgba(55, 45, 32, .18);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 250, 241, .96);
        color: var(--muted);
        box-shadow: 0 8px 22px rgba(50, 38, 25, .16);
        cursor: pointer;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        transform: translateX(-50%);
      }

      .audio-tools {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-content: space-between;
      }

      .progress-wrap {
        grid-column: 1 / -1;
        grid-row: 1;
      }

      .nav-button {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="reader" aria-live="polite">
    <header class="topbar">
      <div class="book-title">
        <h1><a class="title-link" href="https://github.com/sampajano/dhamma-teachings" aria-label="Open source repository on GitHub">佛陀的一生</a></h1>
        <div class="counter" id="counter">第01幕 / 42</div>
      </div>
      <div class="top-actions">
        <div class="jump">
          <label for="sceneSelect">场景</label>
          <select id="sceneSelect" aria-label="场景"></select>
        </div>
      </div>
    </header>

    <section class="spread">
      <figure class="image-page" aria-label="场景">
        <img id="sceneImage" alt="">
      </figure>
      <article class="story-page">
        <p class="kicker" id="kicker">第01幕</p>
        <h2 class="scene-title" id="sceneTitle"></h2>
        <div class="story-text" id="storyText"></div>
      </article>
    </section>

    <footer class="controls controls-collapsed">
      <button class="controls-peek" id="controlsPeek" type="button" aria-label="显示控制条">⌃</button>
      <button class="nav-button" id="prevButton" type="button" aria-label="← 上一幕">← 上一幕</button>
      <div class="audio-tools">
        <button class="audio-button" id="playButton" type="button" aria-label="▶ 播放">▶ 播放</button>
        <label class="auto-toggle">
          <input id="autoAdvance" type="checkbox">
          连续播放
        </label>
        <span class="audio-time" id="audioTime">0:00 / 0:00</span>
      </div>
      <div class="progress-wrap" aria-hidden="true">
        <div class="progress-label">
          <span id="progressStart">开始</span>
          <span id="progressEnd">觉悟之路展开</span>
        </div>
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      </div>
      <button class="nav-button" id="nextButton" type="button" aria-label="下一幕 →">下一幕 →</button>
      <audio id="sceneAudio" preload="metadata"></audio>
    </footer>
  </main>

  <script>
    const scenes = [
  {
    "number": "01",
    "title": "燃灯佛前生起大愿",
    "image": "../assets/images/Buddha%20%28May%29%20-%20001%20-%20The%20Great%20Aspiration%20Before%20Dipankara%20Buddha.png",
    "paragraphs": [
      "在极久远的过去，佛陀还不是释迦牟尼佛，也不是今生的悉达多太子，而是一位名叫善慧的修行者。那时世间已有一位圆满觉悟者，名为燃灯佛。善慧听闻燃灯佛将要到来，心中生起极大的欢喜与敬仰，仿佛看见黑暗世间里出现了一盏不会熄灭的灯。",
      "他来到燃灯佛面前，恭敬献上鲜花。眼前的佛陀安静、明亮、慈悲，身边的僧众也显出清净庄严的气象。善慧不是只被外在光明吸引，而是在燃灯佛身上看见一种生命完全觉醒后的可能：不再被贪爱、恐惧和无明牵引，而能为众生指出离苦的道路。",
      "就在这样的礼敬中，他心里生起深远的方向：未来自己也要修行到圆满觉悟，为迷失在生死苦中的众生指出道路。这个愿还会在下一幕以更彻底的行动表达出来；但它的种子，已经在燃灯佛面前悄悄种下。"
    ],
    "audio": "../assets/audio/zh/Buddha%20%28May%29%20-%20001%20-%20%E7%87%83%E7%81%AF%E4%BD%9B%E5%89%8D%E7%94%9F%E8%B5%B7%E5%A4%A7%E6%84%BF%20-%20cedar.mp3"
  },
  {
    "number": "02",
    "title": "铺发泥中与未来成佛的授记",
    "image": "../assets/images/Buddha%20%28May%29%20-%20002%20-%20The%20Hair%20Spread%20in%20the%20Mud%20and%20the%20Prophecy%20of%20Future%20Buddhahood.png",
    "paragraphs": [
      "燃灯佛经过一段泥泞道路时，善慧菩萨看见地面湿滑污浊，便俯身伏在泥地上，把自己的头发铺开，希望佛陀能够从上面经过，不被泥水沾染。这个动作并不华丽，却很彻底：他愿意用自己的身体承接道路上的污泥，只为让觉者的足迹安稳向前。",
      "在这个伏身铺发的时刻，他的愿变得清楚而坚定：自己未来也要经过长久修行，圆满佛道，像燃灯佛一样利益众生。燃灯佛照见善慧的愿力、信心，以及未来成熟的因缘，便在大众前为他授记：历经漫长修行、圆满诸波罗蜜之后，他将在未来世成为乔达摩佛。",
      "善慧发下的并不是一个轻易能实现的愿望，而是一条漫长而清楚的修行道路。从此以后，他在无数生中修习布施、持戒、忍辱、精进、禅定与智慧。未来的佛陀不是凭空出现的奇迹，而是在这样的愿心、恭敬与长久实践中，逐渐成熟。"
    ],
    "audio": "../assets/audio/zh/Buddha%20%28May%29%20-%20002%20-%20%E9%93%BA%E5%8F%91%E6%B3%A5%E4%B8%AD%E4%B8%8E%E6%9C%AA%E6%9D%A5%E6%88%90%E4%BD%9B%E7%9A%84%E6%8E%88%E8%AE%B0%20-%20cedar.mp3"
  },
  {
    "number": "03",
    "title": "摩耶夫人的白象梦",
    "image": "../assets/images/Buddha%20%28May%29%20-%20003%20-%20Queen%20Maya%27s%20White%20Elephant%20Dream.png",
    "paragraphs": [
      "佛陀最后一生即将开始时，净饭王的王后摩耶夫人做了一个吉梦：一头纯白大象从空中而来，进入她的右胁。梦境宁静而庄严，不像普通纷乱的梦。白象洁净明亮，带着温和而不可思议的力量，仿佛预告一个稀有的生命即将进入人间。",
      "梦醒之后，宫中请贤者解梦。贤者们说，这位孩子将来若留在世间，会成为统领四方、以正道治世的转轮圣王；若出家修行，则会成为圆满觉悟的佛陀。净饭王听到这两种可能，心中自然既欢喜又复杂：王族盼望继承人，世间却可能迎来一位超越王权的觉者。",
      "王宫因此充满期待，也隐隐预感这位孩子的生命不会只是普通王子的命运。清净、庄严、稀有的征兆，像一道安静的光，先照进了他的出生之前。还没有人真正知道他将走向哪里，但故事的气息已经从宫廷的荣耀，转向更深远的觉悟。"
    ],
    "audio": "../assets/audio/zh/Buddha%20%28May%29%20-%20003%20-%20%E6%91%A9%E8%80%B6%E5%A4%AB%E4%BA%BA%E7%9A%84%E7%99%BD%E8%B1%A1%E6%A2%A6%20-%20cedar.mp3"
  },
  {
    "number": "04",
    "title": "蓝毗尼园中的摩耶夫人",
    "image": "../assets/images/Buddha%20%28May%29%20-%20004%20-%20Queen%20Maya%20in%20Lumbini%20Grove.png",
    "paragraphs": [
      "摩耶夫人按照当时习俗回娘家待产，途中经过蓝毗尼园。园中花木繁盛、环境安宁，旅途的疲惫在树影和微风中稍稍缓和。她在树下停留，伸手扶着枝条，临产的时刻就在这片自然的宁静中到来。",
      "这里并不远离人间。它有母亲的身体，有分娩前的辛劳，有随行者的守护，也有园林中柔和的光。未来的佛陀不是从神秘的高处直接降临，而是经过出生、成长、亲情与身体的限制，真正进入人类共同面对的世界。",
      "蓝毗尼园因此成为佛陀一生的起点。觉悟的道路并没有绕开生命本身；它从出生开始，从身体开始，从母亲的慈爱与人间的无常开始。往后的故事会一步步展开，而这一切，先从这座花园中的一次出生开始。"
    ],
    "audio": "../assets/audio/zh/Buddha%20%28May%29%20-%20004%20-%20%E8%93%9D%E6%AF%97%E5%B0%BC%E5%9B%AD%E4%B8%AD%E7%9A%84%E6%91%A9%E8%80%B6%E5%A4%AB%E4%BA%BA%20-%20cedar.mp3"
  },
  {
    "number": "05",
    "title": "悉达多太子的诞生",
    "image": "../assets/images/Buddha%20%28May%29%20-%20005%20-%20The%20Birth%20of%20Prince%20Siddhartha.png",
    "paragraphs": [
      "悉达多太子在蓝毗尼园出生。他出生后立足安稳，面向北方，走了七步；白伞盖覆在上方，他宣示这是自己的最后一生。王族、侍从与天人都围绕在这位新生太子身旁，庆贺一位稀有者来到世间。",
      "“最后一生”并不是普通的荣耀称号，而指向他未来将要完成的事：不再因无明和渴爱继续流转。此时的他仍会像人一样成长，学习语言，经历亲情，面对困惑；但故事已经把终点的光放在起点旁边，让人知道这个生命会走向彻底醒来。",
      "莲花从泥中生长，却不被泥水染污。悉达多也将在世间生活，在王宫中学习，在痛苦中追问，在修行中试探道路，最后从生死的泥水里开出清净的智慧。出生的画面明亮安详，却已经含着他未来要走的方向。"
    ],
    "audio": "../assets/audio/zh/Buddha%20%28May%29%20-%20005%20-%20%E6%82%89%E8%BE%BE%E5%A4%9A%E5%A4%AA%E5%AD%90%E7%9A%84%E8%AF%9E%E7%94%9F%20-%20cedar.mp3"
  },
  {
    "number": "06",
    "title": "阿私陀仙人的预言",
    "image": "../assets/images/Buddha%20%28May%29%20-%20006%20-%20The%20Sage%20Asita%27s%20Prediction.png",
    "paragraphs": [
      "年老的阿私陀仙人来到王宫，看见刚出生的太子。他是一位有修行、有观察力的隐士，久居山林，心不轻易被世间热闹打动。可是当他见到太子身上的殊胜相好时，立刻知道这不是普通的王族孩子。",
      "阿私陀预言这孩子未来只有两种可能：若留在宫中，会成为统领四方、以正道治世的转轮圣王；若出家追求真理，会成为无上觉者。净饭王听见“转轮圣王”当然欢喜，因为那意味着家族与国家的荣耀；但“无上觉者”这另一种可能，也悄悄打开了王宫无法完全掌握的未来。",
      "阿私陀欢喜，是因为他知道未来会有佛出世；他又流泪，是因为自己年事已高，等不到佛陀成道后亲自听闻教法。王宫中的庆贺因此多了一层温柔的遗憾：有人已经看见黎明将来，却知道自己等不到太阳升起。"
    ],
    "audio": "../assets/audio/zh/Buddha%20%28May%29%20-%20006%20-%20%E9%98%BF%E7%A7%81%E9%99%80%E4%BB%99%E4%BA%BA%E7%9A%84%E9%A2%84%E8%A8%80%20-%20cedar.mp3"

  {
    "number": "07",
    "title": "少年太子的树下禅定",
    "image": "../assets/images/Buddha%20%28May%29%20-%20007%20-%20The%20Young%20Prince%20Meditates%20Beneath%20the%20Tree.png",
    "paragraphs": [
      "悉达多还是少年时，有一次在农耕典礼或类似宫廷活动中独自坐在树下。周围的人忙着仪式、耕作和庆祝，王族的活动看起来庄重而热闹。可是少年太子的目光没有停在典礼的光彩上，而是落在被翻开的土地、惊动的小虫，以及鸟兽彼此追逐捕食的景象上。",
      "他看见生命彼此依存，也彼此伤害。田地给人粮食，却也翻动许多细小生命的居处；一个生命想活下去，常常又牵动另一个生命的恐惧。年幼的悉达多没有急着给出答案，只是安静地看着，心中生起一种很深的触动。",
      "就在这样的观察中，他的心自然远离喧闹，进入清明、安稳、柔和的禅定。这不是逃避现实的昏沉，而是在看见苦之后仍然保持清明的安住。多年以后，成道前的悉达多会重新想起这份宁静，发现它正指向不沉溺欲乐、也不折磨身体的中道。"
    ],
    "audio": "../assets/audio/zh/Buddha%20%28May%29%20-%20007%20-%20%E5%B0%91%E5%B9%B4%E5%A4%AA%E5%AD%90%E7%9A%84%E6%A0%91%E4%B8%8B%E7%A6%85%E5%AE%9A%20-%20cedar.mp3"

  {

    "paragraphs": [
      "少年时期，悉达多在园中见到一只被箭射伤的天鹅。箭还留在伤处，天鹅惊恐而虚弱，洁白的羽毛被血染湿。悉达多立刻把它抱起，拔除箭矢，照顾伤口，让这个受惊的生命先从痛苦中缓过来。",
      "射箭的人是提婆达多。他认为天鹅是自己射下来的，所以应归自己所有。对他来说，箭射中了目标，目标就成了战利品；但对悉达多来说，受伤的生命首先不是物品，而是需要救护的众生。两人的争论因此不只是孩子之间的争执，而是两种看待生命的方式。",
      "最后，悉达多提出的不是占有的理由，而是救护的理由：生命不属于伤害它的人，而应归于保护它的人。这个小小的庭园场景，已经露出他后来对一切众生的态度。慈悲不是抽象的漂亮话，而是在痛苦出现时，愿意靠近、照顾、保护。"
    ],

  {

      "悉达多在这些方面都非常出众。他并不是因为无能、失败或被世界排斥，才后来走向出家。相反，他拥有许多人羡慕的一切条件：年轻、尊贵、才华、家族支持、未来权力，以及被精心保护的生活。",

  {

    "paragraphs": [

      "此时，那个真正震动他生命方向的时刻还没有到来。他正生活在被保护、被安排、被期待的幸福之中，身边的人都相信这样的生活已经足够圆满，也希望他能在婚姻、家庭和王位中安住下来。",
      "耶输陀罗与他之间有真实的情分、责任与共同生活。王宫的生活并非虚假，它有温情、义务和人间的美好。只是这份美好还没有触及生命最深处的追问；那些问题暂时像远处的云，尚未压到眼前，却会在后来四相出现时，突然变得无法回避。"
    ],

  {

      "可是悉达多出游时，先后见到老人、病人、死人，以及一位安详的出家修行者。老人让他看见身体会衰败；病人让他看见健康并不可靠；死人让他看见一切相聚终会分离。这些不是少数人的不幸，而是每一个出生者都无法绕开的命运。",

  {

      "但夜深之后，舞女疲惫睡去，乐器散落，妆容凌乱，白天看似迷人的一切露出无常、疲倦和不净的一面。悉达多并不是厌恶这些人，也不是责怪她们；他只是看见了欲乐的另一面。美丽需要不断维持，快乐会疲惫，兴奋过去之后，心仍回到同样的空乏与重复。",
      "享乐能带来短暂的迷醉，却不能解决对老、病、死的恐惧。宫殿没有变坏，只是悉达多看得更清楚了。曾经让人沉醉的东西，现在不再能遮住真相；出离的念头，也在这夜色中变得不可逆转。"

    "paragraphs": [

  },
  {

    "paragraphs": [

      "在世人眼中，他正在离开安全；但在悉达多心中，真正的不安恰恰来自对无常的无知。拥有再多，也挡不住衰老；被保护得再周密，也避不开死亡。他开始验证另一种可能：真正的安全是否来自看透执著、断除烦恼？",
      "出城之后，他不再是被保护的王子，而是一个独自面对生死问题的求道者。伟大出离不是浪漫的远行，而是把自己从所有熟悉依靠中放出来，亲身走向一个还没有答案的问题。"

  },

    "paragraphs": [

      "当他亲手放下这些东西时，也是在放下别人眼中的“我是谁”。王子的身份不能替他回答生死问题，华丽的衣饰不能遮住无常，尊贵的血统也不能让心自动解脱。",

      "悉达多根器敏锐，很快就学会并亲证老师所教的境界。在这样的定中，平日纷乱的心识暂时止息，身心感到广大而轻安。阿罗逻迦蓝非常认可他，甚至认为他可以与自己共同领导学生。对许多修行者来说，这已经是很高的成就与极大的肯定。",
      "悉达多没有轻视这段学习。他认真进入老师所教的最高处，也真实知道深定的力量。但当他从定中观察，仍发现这种境界会依条件而生起，也会依条件而消退；它能令心暂时安住，却还没有彻底拔除苦的根。于是，他知道自己必须继续寻找。"

      "这样的境界非常幽微，普通语言很难把它说清。心既不以粗重的方式思想，也没有完全断灭；觉知像细到几乎不可捉摸的光，停在有想与无想之间。悉达多同样很快掌握这种境界，达到当时修行体系中的最高层次。",
      "他亲身走到深定的最高处，却仍发现这样的境界会因条件而现起，也会因条件而结束。只要它仍依因缘而生，就不是不生不灭的自由；只要无明和渴爱还没有被彻底看破，苦的根就仍可能继续。深定的最高处没有让他停下，反而让他把问题看得更细。"

      "佛陀开示中道：不落入欲乐，也不落入自我折磨。这句话对五位同伴特别有力量，因为他们亲眼见过悉达多走到苦行的尽头，也亲眼见过他离开那条道路。中道不是未经尝试的理论，而是从真实经验中被发现的道路；它能生起眼、生起智，导向寂静、正觉与涅槃。",
      "随后，佛陀宣说四圣谛。被执取束缚的生命有苦：出生、衰老、疾病、死亡、相爱者分离、所求不得，以及执著身心为“我”的沉重。苦的集起来自渴爱；渴爱一次次寻找欢喜，推动生命继续追逐与轮转。苦的止息，是渴爱的离贪、止息与放下。通向止息的，就是需要亲身修习的八支圣道，让智慧、言行、生活、精进、正念与定力都朝向解脱。",

      return window.matchMedia('(max-width: 900px)').matches;
    }

    function isNearPageBottom() {
      const page = document.documentElement;
      return window.innerHeight + window.scrollY >= page.scrollHeight - 90;
    }

    function setControlsCollapsed(collapsed) {
      controls.classList.toggle('controls-collapsed', collapsed);
      controlsPeek.textContent = collapsed ? '⌃' : '⌄';
      controlsPeek.setAttribute('aria-label', collapsed ? controlsLabels.show : controlsLabels.hide);
    }

    function showControls() {
      setControlsCollapsed(false);
      scheduleControlsAutoHide();
    }

    function scheduleControlsAutoHide() {
      window.clearTimeout(controlsAutoHideTimer);
      if (!isMobileLayout()) return;
      if (isNearPageBottom()) return;
      controlsAutoHideTimer = window.setTimeout(hideControls, 4200);
    }

    function hideControls() {
      if (!isMobileLayout() || document.activeElement.closest?.('.controls')) return;
      setControlsCollapsed(true);
    }

    function playCurrentAudio() {
      state.shouldPlayAudio = true;
      showControls();
      sceneAudio.play().then(updatePlayButton).catch(() => {
        state.shouldPlayAudio = false;
        updatePlayButton();
      });
    }

    function pauseAudio() {
      state.shouldPlayAudio = false;
      sceneAudio.pause();
      updatePlayButton();
    }

    function render(index, options = {}) {
      const wasPlaying = state.shouldPlayAudio && !sceneAudio.paused;
      state.index = Math.max(0, Math.min(scenes.length - 1, index));
      const scene = scenes[state.index];
      sceneImage.classList.add('fade-out');
      window.setTimeout(() => {
        sceneImage.src = scene.image;
        sceneImage.alt = `${sceneName(scene)} - ${scene.title}`;
        sceneImage.classList.remove('fade-out');
      }, 90);

      $('#counter').textContent = `${sceneName(scene)} / ${String(scenes.length).padStart(2, '0')}`;
      $('#kicker').textContent = sceneName(scene);
      $('#sceneTitle').textContent = scene.title;
      storyText.innerHTML = scene.paragraphs.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join('');
      storyPage.scrollTop = 0;
      sceneSelect.value = String(state.index);
      $('#prevButton').disabled = state.index === 0;
      $('#nextButton').disabled = state.index === scenes.length - 1;
      $('#progressBar').style.width = `${((state.index + 1) / scenes.length) * 100}%`;
      $('#progressStart').textContent = state.index === 0 ? labels.beginning : sceneName(scene);
      $('#progressEnd').textContent = progressEndLabel(scene);
      document.title = `${sceneName(scene)} - ${scene.title} | ${labels.bookTitle}`;
      sceneAudio.src = scene.audio;
      sceneAudio.load();
      updateAudioTime();
      updatePlayButton();
      if (options.play || wasPlaying) {
        playCurrentAudio();
      } else if (options.keepControls) {
        showControls();
      } else {
        hideControls();
      }
    }

    $('#prevButton').addEventListener('click', () => {
      showControls();
      render(state.index - 1, { keepControls: true });
    });
    $('#nextButton').addEventListener('click', () => {
      showControls();
      render(state.index + 1, { keepControls: true });
    });
    controlsPeek.addEventListener('click', () => {
      const collapsed = controls.classList.contains('controls-collapsed');
      if (collapsed) {
        showControls();
      } else {
        setControlsCollapsed(true);
      }
    });
    sceneSelect.addEventListener('change', (event) => {
      showControls();
      render(Number(event.target.value), { keepControls: true });
    });
    playButton.addEventListener('click', () => {
      showControls();
      if (sceneAudio.paused || sceneAudio.ended) {
        playCurrentAudio();
      } else {
        pauseAudio();
      }
    });

    let lastScrollY = window.scrollY;
    let scrollTimer = 0;
    window.addEventListener('scroll', () => {
      if (!isMobileLayout()) return;
      window.clearTimeout(scrollTimer);
      const currentY = window.scrollY;
      const scrollingDown = currentY > lastScrollY + 8;
      if (currentY < 40 || isNearPageBottom()) {
        showControls();
      } else if (scrollingDown) {
        scrollTimer = window.setTimeout(hideControls, 80);
      } else {
        hideControls();
      }
      lastScrollY = currentY;
    }, { passive: true });

    sceneAudio.addEventListener('loadedmetadata', updateAudioTime);
    sceneAudio.addEventListener('timeupdate', updateAudioTime);
    sceneAudio.addEventListener('play', updatePlayButton);
    sceneAudio.addEventListener('pause', updatePlayButton);
    sceneAudio.addEventListener('ended', () => {
      updatePlayButton();
      if (autoAdvance.checked && state.index < scenes.length - 1) {
        render(state.index + 1, { play: true });
      } else {
        state.shouldPlayAudio = false;
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.defaultPrevented) return;
      if (event.key === 'ArrowLeft') render(state.index - 1);
      if (event.key === 'ArrowRight') render(state.index + 1);
      if (event.key === 'Home') render(0);
      if (event.key === 'End') render(scenes.length - 1);
    });

    renderOptions();
    render(initialSceneIndex());
    window.storybook = { render, scenes };
  </script>
</body>
</html>
